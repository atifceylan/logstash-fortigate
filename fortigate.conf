# ============================================================
# Logstash Configuration for FortiGate
# Author:  M.Atif Ceylan
# Elastic indices
#   - fortigate-traffic-*
#   - fortigate-vpn-*
#   - fortigate-users-*
#   - fortigate-utm-*       (antivirus, webfilter, ips etc.)
#   - fortigate-event-*     (system events, admin, ha etc.)
#   - fortigate-other-*     (uncategorized)
# ============================================================

input {
  udp {
    port  => 5515
    type  => "fortigate_syslog"

    codec => plain {
      charset => "UTF-8"
    }
  }
  tcp {
    port  => 5515
    type  => "fortigate_syslog"
    codec => line { charset => "UTF-8" }
  }
}

# ============================================================
filter {  
    grok {
      match => {
        "message" => "<%{POSINT:syslog_pri}>%{SYSLOGTIMESTAMP:syslog_timestamp} %{IPORHOST:syslog_host} %{GREEDYDATA:raw_msg}"
      }
      overwrite => [ "message" ]
      add_field => { "raw_msg_saved" => "%{raw_msg}" }
      tag_on_failure => ["_syslog_header_parse_fail"]
    }

    if "_syslog_header_parse_fail" in [tags] {
      mutate { add_field => { "raw_msg" => "%{message}" } }
    }
    
    kv {
      source       => "raw_msg"
      field_split  => " "
      value_split  => "="
      trim_key     => " \t"
      trim_value   => "\""
    }
    
    if [date] and [time] {
      mutate { add_field => { "datetime_str" => "%{date} %{time}" } }
      date {
        match    => [ "datetime_str", "yyyy-MM-dd HH:mm:ss" ]
        timezone => "UTC"
        target   => "@timestamp"
      }
      mutate { remove_field => ["datetime_str"] }
    }

    mutate {
      convert => {
        "duration"   => "integer"
        "sentbyte"   => "integer"
        "rcvdbyte"   => "integer"
        "sentpkt"    => "integer"
        "rcvdpkt"    => "integer"
        "srcport"    => "integer"
        "dstport"    => "integer"
        "proto"      => "integer"
        "cpu"        => "float"
        "mem"        => "float"
        "bandwidth"  => "float"
        "tunnelid"   => "integer"
      }
    }
    
    if [srcip] {
      geoip {
        source => "srcip"
        target => "src_geo"
      }
    }
    if [dstip] {
      geoip {
        source => "dstip"
        target => "dst_geo"
      }
    }        

    # Traffic
    if [type] == "traffic" or [logid] =~ /^000[023]/ {      
      mutate { add_field => { "[@metadata][idx]" => "fortigate-traffic" } }
    }

    # VPN
    else if [type] == "vpn" or [subtype] in ["vpn","ssl","ipsec"] or
            [logid] =~ /^0101/ {
      mutate { add_field => { "[@metadata][idx]" => "fortigate-vpn" } }
    }

    # Users / Authentication
    else if [type] == "event" and [subtype] in ["user","authentication","captive-portal"] {
      mutate { add_field => { "[@metadata][idx]" => "fortigate-users" } }
    }
    else if [logid] =~ /^0100[0-3]/ {
      mutate { add_field => { "[@metadata][idx]" => "fortigate-users" } }
    }

    # UTM (antivirus, webfilter, ips, app-ctrl, dlp, emailfilter)
    else if [type] in ["utm","antivirus","webfilter","ips","app-ctrl","dlp","emailfilter"] or
            [subtype] in ["virus","webfilter","ips","app-ctrl","dlp","emailfilter","anomaly"] {
      mutate { add_field => { "[@metadata][idx]" => "fortigate-utm" } }
    }

    # System Events
    else if [type] == "event" and [subtype] in ["system","connector","ha","endpoint","wad","fortiextender"] {
      mutate { add_field => { "[@metadata][idx]" => "fortigate-event" } }

    # Other
    } else {
      mutate { add_field => { "[@metadata][idx]" => "fortigate-other" } }
    }
    
    mutate {
      remove_field => ["raw_msg", "raw_msg_saved", "syslog_pri",
                       "syslog_timestamp", "message"]
    }
}

# ============================================================

output {
  elasticsearch {
    hosts => ["http://127.0.0.1:9200"]
    user => "${ES_USER}"
    password => "${ES_PASS}"
    ssl_enabled => false
    ssl_verification_mode => "none"
    index => "%{[@metadata][idx]}-%{+YYYY.MM.dd}"
  }

  # for debugging
  # stdout { codec => rubydebug }
    
}
